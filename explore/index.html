<html lang="en">
<head>
  <meta charset="utf-8">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Atho">
  <meta property="og:url" content="https://atho.io/explore">
  <meta property="og:title" content="Atho Testnet Explorer Beta">
  <meta property="og:description" content="View live Atho testnet blocks, transactions, mempool activity, and network stats.">
  <meta property="og:image" content="https://atho.io/assets/media/explorer-share-card.png?v=20260507e">
  <meta property="og:image:secure_url" content="https://atho.io/assets/media/explorer-share-card.png?v=20260507e">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Atho Testnet Explorer Beta">
  <meta name="twitter:description" content="View live Atho testnet blocks, transactions, mempool activity, and network stats.">
  <meta name="twitter:image" content="https://atho.io/assets/media/explorer-share-card.png?v=20260507e">
  <meta name="twitter:image:alt" content="Atho testnet explorer preview with live chain metrics and recent block activity.">
  <link rel="icon" type="image/png" href="../assets/media/logo%201.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7faf8;
      --bg-soft: #eff6f2;
      --panel: #ffffff;
      --panel-soft: #f6fbf8;
      --line: rgba(8, 36, 23, 0.09);
      --line-soft: rgba(10, 90, 58, 0.14);
      --text: #102a1e;
      --muted: #557366;
      --accent: #06d58d;
      --accent-2: #0b6e48;
      --accent-soft: #e9fff4;
      --warn: #ad6f15;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --shadow: 0 20px 44px rgba(8, 33, 22, 0.055);
    }

    * {
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: rgba(6, 213, 141, 0.78) #e8f3ed;
    }

    *::-webkit-scrollbar {
      width: 12px;
      height: 12px;
      background: #e8f3ed;
    }

    *::-webkit-scrollbar-thumb {
      border-radius: 999px;
      border: 2px solid #e8f3ed;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(980px 420px at 8% -10%, rgba(6, 213, 141, 0.08), transparent 58%),
        radial-gradient(780px 360px at 100% 0%, rgba(6, 213, 141, 0.06), transparent 54%),
        linear-gradient(180deg, #fbfdfc, #f5faf7 58%, #eff6f2);
      color: var(--text);
      font-family: "JetBrains Mono", var(--mono);
      line-height: 1.5;
    }

    body.busy,
    body.busy * {
      cursor: progress !important;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    code,
    .mono {
      font-family: var(--mono);
    }

    .wrap {
      max-width: 1760px;
      margin: 0 auto;
      padding: 16px 18px 22px;
      position: relative;
      isolation: isolate;
      z-index: 0;
      --mx: 50%;
      --my: 30%;
    }

    .wrap::before {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(420px 280px at var(--mx) var(--my), rgba(6, 213, 141, 0.10), rgba(0, 0, 0, 0) 72%),
        radial-gradient(320px 220px at calc(var(--mx) + 14%) calc(var(--my) + 6%), rgba(6, 213, 141, 0.06), rgba(0, 0, 0, 0) 72%);
      opacity: 0.38;
      filter: blur(12px);
    }

    .wrap::after {
      display: none;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      padding: 14px 18px;
      border: 1px solid rgba(8, 36, 23, 0.07);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(249, 252, 250, 0.9));
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo {
      width: 82px;
      height: auto;
      border: 0;
      background: transparent;
      object-fit: contain;
      object-position: center;
      box-shadow: none;
      padding: 0;
      flex: 0 0 auto;
      filter:
        brightness(0)
        saturate(100%)
        invert(12%)
        sepia(21%)
        saturate(924%)
        hue-rotate(101deg)
        brightness(95%)
        contrast(90%)
        drop-shadow(0 12px 20px rgba(6, 213, 141, 0.09));
    }

    .brand-title {
      font-family: "JetBrains Mono", var(--mono);
      font-size: 0.94rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
    }

    .brand-sub {
      color: var(--muted);
      margin-top: 3px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-mini {
      display: none;
    }

    .toolbar {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar-link,
    .toolbar button,
    .search-row button,
    .network-tab {
      border-radius: 999px;
      border: 1px solid var(--line);
      height: 40px;
      outline: none;
      transition: border-color 70ms ease, box-shadow 95ms ease, transform 70ms ease, background 70ms ease;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .search-shell {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 60px 0 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font-size: 0.92rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
    }

    input:focus {
      border-color: rgba(6, 213, 141, 0.34);
      box-shadow: 0 0 0 4px rgba(6, 213, 141, 0.12);
      transform: translateY(-1px);
    }

    button,
    .toolbar-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: linear-gradient(180deg, #0dd890, #07ba7c);
      color: #032117;
      font-weight: 800;
      font-size: 0.88rem;
      padding: 0 16px;
      box-shadow: 0 12px 24px rgba(6, 213, 141, 0.14);
      position: relative;
      overflow: hidden;
    }

    .search-submit {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 40px;
      min-width: 40px;
      height: 36px;
      padding: 0;
      border-radius: 999px;
      box-shadow: 0 10px 20px rgba(6, 213, 141, 0.12);
    }

    .search-submit svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
    }

    .btn-ghost,
    .toolbar-link,
    .network-tab {
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      border-color: rgba(8, 36, 23, 0.12);
      box-shadow: none;
    }

    button:hover,
    .toolbar-link:hover,
    .network-tab:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(8, 33, 22, 0.08);
    }

    button:disabled,
    .network-tab:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
      box-shadow: none;
      filter: none;
    }

    .network-tab.is-active {
      background: var(--accent-soft);
      color: var(--accent-2);
      border-color: rgba(6, 213, 141, 0.24);
      box-shadow: 0 8px 18px rgba(6, 213, 141, 0.1);
    }

    .status-chip {
      border: 1px solid rgba(6, 213, 141, 0.2);
      border-radius: 999px;
      padding: 6px 11px;
      background: var(--accent-soft);
      color: var(--accent-2);
      font-size: 0.68rem;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-chip.beta {
      color: var(--accent-2);
      border-color: rgba(6, 213, 141, 0.24);
      background: rgba(6, 213, 141, 0.12);
    }

    .warn {
      margin: 6px 0 14px;
      border: 1px solid rgba(173, 111, 21, 0.24);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--warn);
      background: rgba(255, 248, 232, 0.96);
      display: none;
      white-space: pre-wrap;
      box-shadow: 0 10px 22px rgba(173, 111, 21, 0.06);
    }

    .warn.error {
      border-color: rgba(186, 59, 59, 0.2);
      color: #8d2f2f;
      background: rgba(255, 243, 243, 0.96);
    }

    .page {
      min-height: 140px;
      display: grid;
      gap: 12px;
    }

    .page-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(320px, 0.85fr);
      gap: 14px;
    }

    .page-grid-home {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .page-grid-equal {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .section-stack {
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid rgba(8, 36, 23, 0.09);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 252, 250, 0.98));
      box-shadow: var(--shadow);
    }

    .panel-head {
      border-bottom: 1px solid rgba(8, 36, 23, 0.08);
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(6, 213, 141, 0.04), rgba(255, 255, 255, 0.72));
    }

    .panel-body {
      padding: 14px 16px 16px;
    }

    .head-spacer {
      flex: 1 1 auto;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .panel-nav {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .panel-nav-label {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-width: 48px;
      text-align: center;
      padding: 0 4px;
    }

    .panel-size-select {
      height: 32px;
      min-width: 60px;
      padding: 0 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      font-family: "JetBrains Mono", var(--mono);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      outline: none;
    }

    .mini {
      height: 32px;
      min-width: 32px;
      padding: 0 8px;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .panel-nav-arrow {
      padding: 0;
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1;
    }

    .crumb,
    .route-note,
    .muted {
      color: var(--muted);
    }

    .overview-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(220px, 0.55fr);
      gap: 16px;
      align-items: center;
      margin-bottom: 14px;
    }

    .overview-kicker {
      color: var(--accent-2);
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .overview-title {
      margin: 6px 0 8px;
      font-size: 1.82rem;
      line-height: 1.04;
      letter-spacing: 0;
      font-weight: 800;
    }

    .overview-lead {
      max-width: 46ch;
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.52;
    }

    .overview-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .overview-note {
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.45;
    }

    .overview-side {
      display: grid;
      gap: 8px;
      justify-items: end;
      align-content: center;
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.92);
    }

    .metric-cell {
      min-height: 90px;
      padding: 13px 14px;
      display: grid;
      gap: 6px;
      align-content: start;
      border-left: 1px solid rgba(8, 36, 23, 0.08);
      border-top: 1px solid rgba(8, 36, 23, 0.08);
    }

    .metric-cell:nth-child(-n + 4) {
      border-top: 0;
    }

    .metric-cell:nth-child(4n + 1) {
      border-left: 0;
    }

    .metric-cell.clickable {
      cursor: pointer;
    }

    .metric-cell.clickable:hover {
      background: rgba(6, 213, 141, 0.08);
    }

    .metric-cell:not(.clickable) {
      cursor: default;
    }

    .metric-k {
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .metric-v {
      font-size: 1.12rem;
      font-weight: 800;
      line-height: 1.08;
      word-break: break-word;
    }

    .metric-m {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.32;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      padding: 13px 14px;
      min-height: 78px;
      transition: transform 70ms ease, border-color 95ms ease, box-shadow 95ms ease, background 70ms ease;
    }

    .stat.clickable {
      cursor: pointer;
    }

    .stat.clickable:hover {
      transform: translateY(-1px);
      border-color: rgba(6, 213, 141, 0.22);
      box-shadow: 0 14px 26px rgba(8, 33, 22, 0.07);
      background: rgba(255, 255, 255, 1);
    }

    .stat .k {
      font-size: 0.74rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .stat .v {
      margin-top: 6px;
      font-size: 1.22rem;
      font-weight: 800;
      line-height: 1.08;
      word-break: break-word;
    }

    .stat .m {
      margin-top: 6px;
      font-size: 0.74rem;
      color: var(--muted);
    }

    .chips,
    .table-chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .chip {
      border: 1px solid rgba(8, 36, 23, 0.1);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.72rem;
      color: var(--accent-2);
      background: rgba(6, 213, 141, 0.08);
      font-weight: 700;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.92);
    }

    .detail-row {
      min-height: 76px;
      padding: 12px 14px;
      border-top: 1px solid rgba(8, 36, 23, 0.08);
      border-left: 1px solid rgba(8, 36, 23, 0.08);
    }

    .detail-row:nth-child(-n + 2) {
      border-top: 0;
    }

    .detail-row:nth-child(2n + 1) {
      border-left: 0;
    }

    .detail-key {
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .detail-note {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .detail-sections {
      display: grid;
      gap: 14px;
    }

    .detail-section {
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.92);
    }

    .detail-section-head {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(8, 36, 23, 0.08);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-2);
    }

    .detail-list {
      display: grid;
    }

    .detail-list-row {
      display: grid;
      grid-template-columns: minmax(112px, 0.8fr) minmax(0, 1.2fr);
      gap: 12px;
      padding: 12px 14px;
      border-top: 1px solid rgba(8, 36, 23, 0.08);
    }

    .detail-list-row:first-child {
      border-top: 0;
    }

    .detail-list-label {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .detail-list-value {
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .cards-2,
    .cards-3 {
      display: grid;
      gap: 12px;
    }

    .cards-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .cards-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .kv {
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      padding: 13px 14px;
      min-height: 80px;
    }

    .kv .k {
      color: var(--muted);
      font-size: 0.68rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .kv .v {
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.26;
      word-break: break-word;
    }

    .link {
      color: var(--accent-2);
      cursor: pointer;
      border-bottom: 1px dashed rgba(11, 110, 72, 0.24);
      text-decoration: none;
      transition: color 120ms ease, border-color 120ms ease, text-shadow 180ms ease;
      display: inline-block;
    }

    .link:hover {
      color: #0a5f40;
      border-bottom-color: rgba(11, 110, 72, 0.42);
      text-shadow: none;
    }

    .inline-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      vertical-align: middle;
      flex-wrap: wrap;
      overflow-wrap: anywhere;
    }

    .inline-actions .link {
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .copy-mini {
      min-width: 46px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(8, 36, 23, 0.12);
      background: #ffffff;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1;
      padding: 0 10px;
      box-shadow: none;
      flex: 0 0 auto;
      white-space: nowrap;
      align-self: flex-start;
      width: fit-content;
    }

    .copy-mini:hover {
      border-color: rgba(6, 213, 141, 0.24);
      color: var(--accent-2);
      background: rgba(6, 213, 141, 0.06);
      filter: none;
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(8, 33, 22, 0.06);
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .x-scroll,
    .blocktx-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 14px;
      background: #fbfdfc;
    }

    .table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .table th,
    .table td {
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid rgba(8, 36, 23, 0.08);
      padding: 9px 10px;
      vertical-align: top;
    }

    .table thead th {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      background: #f5faf7;
    }

    .table tbody tr:nth-child(odd) {
      background: rgba(6, 213, 141, 0.012);
    }

    .table tbody tr:hover {
      background: rgba(6, 213, 141, 0.06);
    }

    .table tbody tr[data-action] {
      cursor: pointer;
    }

    .table.compact {
      min-width: 0;
    }

    .table.compact th,
    .table.compact td {
      padding: 8px 10px;
    }

    .blocks-card-grid,
    .stack {
      display: grid;
      gap: 10px;
    }

    .block-card,
    .item {
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.94);
      padding: 10px 12px;
      display: grid;
      gap: 10px;
      text-align: left;
      transition: transform 70ms ease, border-color 95ms ease, box-shadow 95ms ease, background 70ms ease;
    }

    .block-card {
      grid-template-columns: 160px 1fr;
      align-items: center;
      cursor: pointer;
    }

    .block-card:hover,
    .item:hover {
      transform: translateY(-1px);
      border-color: rgba(6, 213, 141, 0.2);
      box-shadow: 0 14px 26px rgba(8, 33, 22, 0.08);
    }

    .block-head {
      display: grid;
      gap: 3px;
      justify-items: start;
      align-content: center;
      padding-right: 10px;
      border-right: 1px solid rgba(8, 36, 23, 0.08);
    }

    .block-card .h {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
    }

    .block-card .sub {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .block-summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0;
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 12px;
      background: #f6fbf8;
      overflow: hidden;
    }

    .block-metric {
      padding: 7px 8px;
      display: grid;
      gap: 2px;
      min-height: 54px;
      text-align: center;
      border-left: 1px solid rgba(8, 36, 23, 0.08);
    }

    .block-metric:first-child {
      border-left: 0;
    }

    .block-metric .k {
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .block-metric .v {
      font-size: 0.84rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.15;
      word-break: break-word;
    }

    .item .title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--accent-2);
      font-size: 0.92rem;
    }

    .item .meta {
      color: var(--muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.84rem;
    }

    .empty {
      border: 1px dashed rgba(11, 110, 72, 0.18);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      padding: 18px;
      background: rgba(233, 255, 244, 0.38);
      font-size: 0.84rem;
    }

    .footnote {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .explorer-footer {
      margin-top: 16px;
      padding: 10px 2px 4px;
      color: var(--muted);
      font-size: 0.64rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .explorer-footer a {
      color: var(--accent-2);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 24, 17, 0.24);
      z-index: 1900;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    .loading-overlay.open {
      display: flex;
      pointer-events: auto;
    }

    .loading-card {
      min-width: 260px;
      max-width: min(86vw, 420px);
      border: 1px solid rgba(8, 36, 23, 0.08);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #f8fcfa);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .loading-spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(6, 213, 141, 0.16);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    .loading-text {
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .json-modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(8, 24, 17, 0.42);
      backdrop-filter: blur(3px);
    }

    .json-modal.open {
      display: flex;
    }

    .json-modal-card {
      width: min(1100px, 100%);
      max-height: calc(100vh - 38px);
      overflow: hidden;
      border: 1px solid rgba(8, 36, 23, 0.1);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 28px 56px rgba(8, 33, 22, 0.16);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .json-modal-head,
    .json-modal-foot {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(8, 36, 23, 0.08);
    }

    .json-modal-foot {
      justify-content: flex-end;
      border-top: 1px solid rgba(8, 36, 23, 0.08);
      border-bottom: 0;
    }

    .json-modal-title {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .json-modal-body {
      margin: 0;
      overflow: auto;
      padding: 16px;
      background: linear-gradient(180deg, #fbfffd, #f2faf5);
      color: var(--text);
      font-size: 0.82rem;
      line-height: 1.52;
      white-space: pre;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1280px) {
      .stats,
      .metric-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric-cell:nth-child(-n + 2) {
        border-top: 0;
      }

      .metric-cell:nth-child(2n + 1) {
        border-left: 0;
      }

      .page-grid,
      .page-grid-home,
      .cards-3,
      .overview-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 860px) {
      .topbar,
      .search-row,
      .cards-2,
      .cards-3,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .search-row {
        gap: 8px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .metric-strip,
      .stats {
        grid-template-columns: 1fr;
      }

      .metric-cell,
      .detail-row {
        border-left: 0;
      }

      .metric-cell + .metric-cell,
      .detail-row + .detail-row {
        border-top: 1px solid rgba(8, 36, 23, 0.08);
      }

      .detail-row:nth-child(-n + 2) {
        border-top: 1px solid rgba(8, 36, 23, 0.08);
      }

      .detail-row:first-child {
        border-top: 0;
      }

      .table {
        min-width: 700px;
      }

      .table.mobile-stack {
        min-width: 0;
      }

      .table.mobile-stack thead {
        display: none;
      }

      .table.mobile-stack tbody {
        display: grid;
        gap: 10px;
        padding: 10px;
      }

      .table.mobile-stack tbody tr {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid rgba(8, 36, 23, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.96);
      }

      .table.mobile-stack tbody tr:nth-child(odd) {
        background: rgba(255, 255, 255, 0.96);
      }

      .table.mobile-stack td {
        display: grid;
        grid-template-columns: minmax(96px, 0.75fr) minmax(0, 1.25fr);
        gap: 10px;
        padding: 0;
        white-space: normal;
        border: 0;
        align-items: start;
      }

      .table.mobile-stack td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .table.mobile-stack td[colspan] {
        display: block;
      }

      .table.mobile-stack td[colspan]::before {
        display: none;
      }

      .table.mobile-stack td.mono,
      .table.mobile-stack td .mono {
        overflow-wrap: anywhere;
      }

      .detail-value .inline-actions {
        display: grid;
        gap: 8px;
        justify-items: start;
      }

      .table.mobile-stack td .inline-actions {
        display: grid;
        gap: 8px;
        justify-items: start;
      }

      .table.mobile-stack td .copy-mini {
        width: fit-content;
      }

      .block-card {
        grid-template-columns: 1fr;
      }

      .block-head {
        justify-items: center;
        text-align: center;
        padding-right: 0;
        border-right: 0;
        padding-bottom: 8px;
        border-bottom: 1px dashed rgba(52, 129, 102, 0.42);
      }

      .block-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .topbar {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 10px;
      }

      .brand {
        gap: 12px;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
      }

      .brand-logo {
        width: 82px;
      }

      .brand-title {
        font-size: 0.9rem;
      }

      .brand-sub {
        font-size: 0.68rem;
      }

      .overview-title {
        font-size: 1.46rem;
      }

      .table.mobile-stack tbody {
        padding: 10px;
      }

      .table.mobile-stack tbody tr {
        padding: 12px;
      }

      .table.mobile-stack td {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .block-summary {
        grid-template-columns: 1fr;
      }

      .panel-nav {
        width: 100%;
        justify-content: flex-start;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="../index.html" aria-label="Return to Atho home">
        <img class="brand-logo" src="../assets/media/logo%201.png" alt="Atho logo">
        <div>
          <div class="brand-title">Atho Explorer</div>
          <div class="brand-sub" id="networkBadge">Testnet</div>
        </div>
      </a>
      <div class="toolbar">
        <button class="network-tab is-active" type="button" data-network-tab="testnet">Testnet</button>
        <span class="status-chip beta">Beta</span>
      </div>
    </header>

    <div class="search-row">
      <div class="search-shell">
        <input id="queryInput" placeholder="Search height, block hash, txid, or address" autocomplete="off">
        <button class="search-submit" type="button" data-action="submit-search" aria-label="Search explorer" title="Search explorer">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M20 20l-3.5-3.5"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="warn" id="warnBox"></div>

    <main class="page" id="pageRoot" aria-live="polite"></main>

    <footer class="explorer-footer">
      <div>Auto refresh: stats 15s · mempool 10s.</div>
    </footer>
  </div>

  <div class="loading-overlay" id="loadingOverlay" aria-live="polite" aria-busy="true">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Loading explorer data...</div>
    </div>
  </div>

  <div class="json-modal" id="jsonModal" aria-hidden="true">
    <div class="json-modal-card">
      <div class="json-modal-head">
        <div class="json-modal-title" id="jsonModalTitle">JSON View</div>
        <span class="head-spacer"></span>
        <button class="btn-ghost mini" type="button" data-action="copy-json-modal">Copy</button>
        <button class="btn-ghost mini" type="button" data-action="close-json-modal">Close</button>
      </div>
      <pre class="json-modal-body" id="jsonModalBody"></pre>
      <div class="json-modal-foot">
        <button class="btn-ghost mini" type="button" data-action="close-json-modal">Close</button>
      </div>
    </div>
  </div>

  <script>
    window.ATHO_EXPLORER_CONFIG = {
      testnetApiBaseUrl: "https://testnet-node1.atho.io/api/v1"
    };
  </script>
  <script type="module" src="../assets/js/explore.js?v=20260507e"></script>
</body>
</html>
