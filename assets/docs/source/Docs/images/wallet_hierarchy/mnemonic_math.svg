<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-label="Mnemonic math">
  <defs>
    <style>
      .bg { fill: #0f1117; }
      .title { fill: #ffffff; font: 700 36px Arial, sans-serif; }
      .box { fill: #171b26; stroke: #38dfc2; stroke-width: 2; rx: 16; }
      .h { fill: #9afbe8; font: 700 22px Arial, sans-serif; }
      .t { fill: #d7e3ff; font: 500 18px Arial, sans-serif; }
      .small { fill: #a8b8dc; font: 500 16px Arial, sans-serif; }
      .arrow { stroke: #48f2d0; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#48f2d0"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="760"/>
  <text class="title" x="60" y="70">Mnemonic Math (exactly what the code does)</text>

  <rect class="box" x="80" y="130" width="1440" height="170"/>
  <text class="h" x="110" y="175">Entropy -> checksum bits</text>
  <text class="t" x="110" y="206">checksum_bits = entropy_bits / 32</text>
  <text class="t" x="110" y="236">bitstream = entropy_bits + checksum_bits</text>
  <text class="small" x="110" y="266">Checksum comes from first checksum_bits of SHA3-512(entropy).</text>

  <rect class="box" x="80" y="340" width="1440" height="170"/>
  <text class="h" x="110" y="385">Bitstream -> words</text>
  <text class="t" x="110" y="416">Split into 11-bit chunks. Each 11-bit value indexes one word in a 2048-word list.</text>
  <text class="t" x="110" y="446">words = (entropy_bits + checksum_bits) / 11</text>

  <rect class="box" x="80" y="550" width="1440" height="170"/>
  <text class="h" x="110" y="595">Examples</text>
  <text class="t" x="110" y="626">12 words: 128 + 4 = 132 bits -> 12 x 11-bit words</text>
  <text class="t" x="110" y="656">24 words: 256 + 8 = 264 bits -> 24 x 11-bit words | 48 words: 512 + 16 = 528 bits -> 48 x 11-bit words</text>

  <path class="arrow" d="M800 300 L800 340"/>
  <path class="arrow" d="M800 510 L800 550"/>
</svg>
