<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Launch and 2027 ecosystem targets</title>
  <desc id="desc">Detailed launch lane covering testnet expansion, mainnet, mobile wallets, wAtho, and P2P rails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3fcf8"/>
      <stop offset="100%" stop-color="#deefe7"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafffd"/>
      <stop offset="100%" stop-color="#e8f5ef"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f9c6d"/>
      <stop offset="100%" stop-color="#2ab6ed"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#eef8f3" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f3c31" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <text x="52" y="70" fill="#0f2e26" font-family="'Space Grotesk', sans-serif" font-size="36" font-weight="700">Launch Lane and 2027 Ecosystem Expansion</text>
  <text x="52" y="100" fill="#2a6553" font-family="'Space Grotesk', sans-serif" font-size="18">Public testnet scale-up -> mainnet target -> wallets, interoperability, and P2P market rails.</text>

  <path d="M78 442C196 372 300 410 410 328C518 248 616 284 726 210C790 168 834 154 894 124" fill="none" stroke="#71c5a6" stroke-opacity="0.3" stroke-width="54" stroke-linecap="round"/>
  <path d="M78 442C196 372 300 410 410 328C518 248 616 284 726 210C790 168 834 154 894 124" fill="none" stroke="url(#road)" stroke-width="42" stroke-linecap="round"/>
  <path d="M78 442C196 372 300 410 410 328C518 248 616 284 726 210C790 168 834 154 894 124" fill="none" stroke="#86b6a2" stroke-width="2"/>
  <path d="M78 442C196 372 300 410 410 328C518 248 616 284 726 210C790 168 834 154 894 124" fill="none" stroke="url(#lane)" stroke-width="7" stroke-linecap="round" stroke-dasharray="20 16"/>

  <g fill="#0f9c6d" stroke="#fff" stroke-width="4" font-family="'Space Grotesk', sans-serif" text-anchor="middle">
    <g><circle cx="132" cy="414" r="15"/><text x="132" y="388" fill="#0f2e26" font-size="12" font-weight="700">Q4 2026</text><text x="132" y="438" fill="#1f5f4f" font-size="11">Public Testnet</text></g>
    <g><circle cx="318" cy="364" r="15"/><text x="318" y="338" fill="#0f2e26" font-size="12" font-weight="700">2027</text><text x="318" y="388" fill="#1f5f4f" font-size="11">Mainnet Target</text></g>
    <g><circle cx="500" cy="292" r="15"/><text x="500" y="266" fill="#0f2e26" font-size="12" font-weight="700">Q2 2027</text><text x="500" y="316" fill="#1f5f4f" font-size="11">Mobile Wallets</text></g>
    <g><circle cx="684" cy="232" r="15"/><text x="684" y="206" fill="#0f2e26" font-size="12" font-weight="700">H2 2027</text><text x="684" y="256" fill="#1f5f4f" font-size="11">wAtho + Liquidity</text></g>
    <g><circle cx="858" cy="142" r="15"/><text x="858" y="116" fill="#0f2e26" font-size="12" font-weight="700">H2 2027+</text><text x="858" y="166" fill="#1f5f4f" font-size="11">P2P Rail Target</text></g>
  </g>

  <g filter="url(#shadow)">
    <rect x="56" y="454" width="848" height="60" rx="14" fill="url(#panel)" stroke="#8dc5ae"/>
    <text x="78" y="479" fill="#1b5e4d" font-family="monospace" font-size="13">planned progression: mainnet readiness -> mobile distribution -> cross-network access -> native peer-to-peer market rails</text>
    <text x="78" y="498" fill="#1b5e4d" font-family="monospace" font-size="13">delivery principle: security review, staged deployment, measurable operator reliability before each release gate</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="734" y="266" width="172" height="146" rx="14" fill="url(#panel)" stroke="#8dc5ae"/>
    <text x="754" y="294" fill="#1a5b49" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700">Ecosystem Icons</text>

    <rect x="754" y="312" width="32" height="54" rx="8" fill="#0f9c6d"/>
    <rect x="760" y="318" width="20" height="36" rx="4" fill="#e8fff6"/>

    <circle cx="826" cy="338" r="19" fill="#0f9c6d"/>
    <text x="819" y="343" fill="#e8fff6" font-family="monospace" font-size="13" font-weight="700">wA</text>

    <rect x="856" y="320" width="30" height="30" rx="8" fill="#0f9c6d"/>
    <path d="M863 335h16M871 327v16" stroke="#e8fff6" stroke-width="2" stroke-linecap="round"/>

    <text x="754" y="384" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="12">Mobile Wallets</text>
    <text x="754" y="400" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="12">wAtho (ERC-20)</text>
    <text x="754" y="416" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="12">P2P BTC/LTC/BCH rails</text>
  </g>
</svg>
