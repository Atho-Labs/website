<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" fill="none">
  <rect width="1280" height="480" rx="28" fill="#FCFFFD"/>
  <rect x="20" y="20" width="1240" height="440" rx="24" fill="#FFFFFF" stroke="rgba(8,36,23,0.12)"/>
  <text x="54" y="74" fill="#082417" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700">UTXO Transaction Lifecycle</text>
  <text x="54" y="108" fill="#47665A" font-family="JetBrains Mono, monospace" font-size="18">How value moves from existing outputs to new outputs through the network.</text>

  <g font-family="JetBrains Mono, monospace" fill="#082417">
    <rect x="54" y="164" width="220" height="196" rx="22" fill="#F7FBF9" stroke="rgba(8,36,23,0.1)"/>
    <text x="88" y="206" font-size="21" font-weight="700">Existing UTXOs</text>
    <text x="88" y="238" font-size="15">Wallet owns spendable</text>
    <text x="88" y="264" font-size="15">outputs from earlier</text>
    <text x="88" y="290" font-size="15">confirmed transactions.</text>
    <rect x="88" y="314" width="150" height="18" rx="9" fill="#98E8C6"/>
    <text x="88" y="348" font-size="15">Examples: 2 ATHO, 1 ATHO</text>

    <rect x="318" y="164" width="220" height="196" rx="22" fill="#E9FFF4" stroke="rgba(6,213,141,0.24)"/>
    <text x="344" y="206" font-size="21" font-weight="700">Wallet Build</text>
    <text x="344" y="238" font-size="15">Select inputs, define</text>
    <text x="344" y="264" font-size="15">recipient output, change,</text>
    <text x="344" y="290" font-size="15">fee, signature, tx PoW.</text>
    <text x="344" y="332" font-size="15">Example: send 2.4 ATHO</text>

    <rect x="582" y="164" width="220" height="196" rx="22" fill="#F7FBF9" stroke="rgba(8,36,23,0.1)"/>
    <text x="624" y="206" font-size="21" font-weight="700">Mempool</text>
    <text x="608" y="238" font-size="15">Node checks policy,</text>
    <text x="608" y="264" font-size="15">ownership, signatures,</text>
    <text x="608" y="290" font-size="15">and anti-spam proof.</text>

    <rect x="846" y="164" width="220" height="196" rx="22" fill="#F7FBF9" stroke="rgba(8,36,23,0.1)"/>
    <text x="878" y="206" font-size="21" font-weight="700">Block Inclusion</text>
    <text x="872" y="238" font-size="15">Miner adds the valid</text>
    <text x="872" y="264" font-size="15">transaction to a block</text>
    <text x="872" y="290" font-size="15">template and mines it.</text>

    <rect x="1110" y="164" width="116" height="196" rx="22" fill="#E9FFF4" stroke="rgba(6,213,141,0.24)"/>
    <text x="1128" y="206" font-size="21" font-weight="700">New</text>
    <text x="1128" y="232" font-size="21" font-weight="700">UTXOs</text>
    <text x="1126" y="264" font-size="15">Old inputs are</text>
    <text x="1126" y="290" font-size="15">spent. New</text>
    <text x="1126" y="316" font-size="15">outputs become</text>
    <text x="1126" y="342" font-size="15">wallet state.</text>
  </g>

  <g stroke="#0B6E48" stroke-width="4" stroke-linecap="round">
    <line x1="274" y1="262" x2="312" y2="262"/>
    <line x1="538" y1="262" x2="576" y2="262"/>
    <line x1="802" y1="262" x2="840" y2="262"/>
    <line x1="1066" y1="262" x2="1104" y2="262"/>
  </g>
  <g fill="#0B6E48">
    <path d="M302 254L318 262L302 270V254Z"/>
    <path d="M566 254L582 262L566 270V254Z"/>
    <path d="M830 254L846 262L830 270V254Z"/>
    <path d="M1094 254L1110 262L1094 270V254Z"/>
  </g>
</svg>
