# To better understand this file read this:
# https://docs.ionos.space/docs/github-actions-customization/

name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  DEPLOYMENT_FOLDER: ./ionos-upload

jobs:
# Please do not rename this job
  build-project:
    name: build website
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build deploy bundle
        run: |
          bash scripts/build_ionos_bundle.sh

      - name: Validate deploy size
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path("ionos-upload")
          size = sum(p.stat().st_size for p in root.rglob("*") if p.is_file())
          print(f"Deployment folder size: {size} bytes")
          # Keep a safety margin below the IONOS quota shown in workflow failures (~50,003,968 bytes).
          if size > 49_000_000:
              raise SystemExit("Deployment folder is too large for IONOS quota.")
          PY

# Please do not touch the following action
      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-us.ionos.space
          project-id: 79353570-e96a-4640-8783-5cf9b2c93269
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.DEPLOYMENT_FOLDER }}
          config-file: .deploy-now/website/config.yaml
          action: upload
