<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Private testnet and network hardening</title>
  <desc id="desc">Detailed node topology map for testnet and consensus reliability tuning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2fbf7"/>
      <stop offset="100%" stop-color="#dcede5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#edf8f3" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f3c31" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <text x="52" y="70" fill="#0f2e26" font-family="'Space Grotesk', sans-serif" font-size="36" font-weight="700">Private Testnet and Network Hardening</text>
  <text x="52" y="100" fill="#2a6553" font-family="'Space Grotesk', sans-serif" font-size="18">7-node private rounds, serialization fixes, P2P consistency tuning, and sync resilience checks.</text>

  <g stroke="#2b8f6e" stroke-width="4" opacity="0.82">
    <line x1="118" y1="292" x2="244" y2="176"/>
    <line x1="118" y1="292" x2="252" y2="370"/>
    <line x1="244" y1="176" x2="410" y2="132"/>
    <line x1="244" y1="176" x2="418" y2="268"/>
    <line x1="252" y1="370" x2="418" y2="268"/>
    <line x1="252" y1="370" x2="416" y2="416"/>
    <line x1="410" y1="132" x2="582" y2="198"/>
    <line x1="418" y1="268" x2="582" y2="198"/>
    <line x1="418" y1="268" x2="588" y2="330"/>
    <line x1="416" y1="416" x2="588" y2="330"/>
    <line x1="582" y1="198" x2="764" y2="170"/>
    <line x1="582" y1="198" x2="764" y2="286"/>
    <line x1="588" y1="330" x2="764" y2="286"/>
    <line x1="764" y1="170" x2="844" y2="244"/>
    <line x1="764" y1="286" x2="844" y2="244"/>
  </g>

  <g font-family="'Space Grotesk', sans-serif" font-size="11" text-anchor="middle">
    <g><circle cx="118" cy="292" r="22" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="118" y="296" fill="#ffffff" font-weight="700">N1</text></g>
    <g><circle cx="244" cy="176" r="20" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="244" y="180" fill="#ffffff" font-weight="700">N2</text></g>
    <g><circle cx="252" cy="370" r="20" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="252" y="374" fill="#ffffff" font-weight="700">N3</text></g>
    <g><circle cx="410" cy="132" r="20" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="410" y="136" fill="#ffffff" font-weight="700">N4</text></g>
    <g><circle cx="418" cy="268" r="24" fill="#12a977" stroke="#fff" stroke-width="4"/><text x="418" y="272" fill="#ffffff" font-weight="700">N5</text></g>
    <g><circle cx="416" cy="416" r="20" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="416" y="420" fill="#ffffff" font-weight="700">N6</text></g>
    <g><circle cx="582" cy="198" r="22" fill="#12a977" stroke="#fff" stroke-width="4"/><text x="582" y="202" fill="#ffffff" font-weight="700">N7</text></g>
    <g><circle cx="588" cy="330" r="22" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="588" y="334" fill="#ffffff" font-weight="700">N8</text></g>
    <g><circle cx="764" cy="170" r="20" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="764" y="174" fill="#ffffff" font-weight="700">N9</text></g>
    <g><circle cx="764" cy="286" r="20" fill="#0f9c6d" stroke="#fff" stroke-width="4"/><text x="764" y="290" fill="#ffffff" font-weight="700">N10</text></g>
    <g><circle cx="844" cy="244" r="24" fill="#14af7c" stroke="#fff" stroke-width="4"/><text x="844" y="248" fill="#ffffff" font-weight="700">CORE</text></g>
  </g>

  <g filter="url(#shadow)">
    <rect x="62" y="446" width="840" height="64" rx="14" fill="url(#panel)" stroke="#8dc5ae"/>
    <text x="84" y="474" fill="#1c5e4d" font-family="monospace" font-size="14">validation: connectivity OK • serialization canonicalized • p2p gossip stabilized • sync checkpoints consistent</text>
    <text x="84" y="494" fill="#1c5e4d" font-family="monospace" font-size="14">focus: incident logging, onboarding automation, and operator playbook hardening</text>
  </g>
</svg>
