<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Research and cryptography phase</title>
  <desc id="desc">Detailed visual of cryptographic research papers, formulas, and analysis workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fcf8"/>
      <stop offset="100%" stop-color="#deefe8"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eff8f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f3c31" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#97c8b5" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#grid)"/>

  <text x="58" y="74" fill="#0f2e26" font-family="'Space Grotesk', sans-serif" font-size="36" font-weight="700">Deep Cryptography Research Phase</text>
  <text x="58" y="104" fill="#2a6553" font-family="'Space Grotesk', sans-serif" font-size="18">Falcon-512, Kyber-512/1024, SHA3 family, encapsulation pathways, and threat-modeling review.</text>

  <g filter="url(#shadow)">
    <rect x="84" y="140" width="360" height="308" rx="18" fill="url(#paper)" stroke="#8dc5ae"/>
    <text x="110" y="180" fill="#1b5b4a" font-family="monospace" font-size="18" font-weight="700">FALCON-512 PAPER NOTES</text>
    <text x="110" y="212" fill="#2d7260" font-family="monospace" font-size="14">• Signature distribution + compression profile</text>
    <text x="110" y="238" fill="#2d7260" font-family="monospace" font-size="14">• Deterministic serialization boundaries</text>
    <text x="110" y="264" fill="#2d7260" font-family="monospace" font-size="14">• Verification-path attack surface review</text>
    <text x="110" y="306" fill="#1b5b4a" font-family="monospace" font-size="18" font-weight="700">SHA3 / DOMAIN SEPARATION</text>
    <text x="110" y="336" fill="#2d7260" font-family="monospace" font-size="14">H(domain || msg || context) routing strategy</text>
    <text x="110" y="362" fill="#2d7260" font-family="monospace" font-size="14">Replay boundary and payload digest invariants</text>
    <text x="110" y="388" fill="#2d7260" font-family="monospace" font-size="14">Canonical encoding checks before consensus ingest</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="478" y="172" width="394" height="276" rx="18" fill="url(#paper)" stroke="#8dc5ae"/>
    <text x="504" y="208" fill="#1b5b4a" font-family="monospace" font-size="18" font-weight="700">KYBER RESEARCH BOARD</text>
    <text x="504" y="236" fill="#2d7260" font-family="monospace" font-size="14">Kyber-512 tx path + Kyber-1024 at-rest layer</text>
    <text x="504" y="262" fill="#2d7260" font-family="monospace" font-size="14">Encapsulation / decapsulation state transitions</text>
    <text x="504" y="288" fill="#2d7260" font-family="monospace" font-size="14">Ciphertext size, key handling, and restore logic</text>
    <text x="504" y="326" fill="#1b5b4a" font-family="monospace" font-size="18" font-weight="700">RESEARCH OUTPUTS</text>
    <text x="504" y="352" fill="#2d7260" font-family="monospace" font-size="14">• Key manager architecture for large key material</text>
    <text x="504" y="376" fill="#2d7260" font-family="monospace" font-size="14">• Consensus-safe serialization requirements</text>
    <text x="504" y="400" fill="#2d7260" font-family="monospace" font-size="14">• Initial private-flow implementation constraints</text>
  </g>

  <g transform="translate(756 134)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="#0f9c6d" stroke-width="12"/>
    <line x1="34" y1="34" x2="74" y2="74" stroke="#0f9c6d" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
