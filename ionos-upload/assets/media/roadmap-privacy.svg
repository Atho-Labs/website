<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Platinum Shield and privacy engineering</title>
  <desc id="desc">Detailed shield visual showing private/public coexistence and authenticity checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1fbf7"/>
      <stop offset="100%" stop-color="#d8eef2"/>
    </linearGradient>
    <linearGradient id="shieldOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14ad7a"/>
      <stop offset="100%" stop-color="#0f8d66"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#143a31"/>
      <stop offset="100%" stop-color="#0f2d26"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#eef9f4" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f3c31" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <text x="54" y="70" fill="#0f2e26" font-family="'Space Grotesk', sans-serif" font-size="36" font-weight="700">Platinum Shield and Privacy Engineering</text>
  <text x="54" y="100" fill="#2a6553" font-family="'Space Grotesk', sans-serif" font-size="18">Public UTXO and private-note flows coexisting under deterministic consensus and authenticity proofs.</text>

  <g filter="url(#shadow)">
    <path d="M480 96L706 178V304C706 404 626 482 480 516C334 482 254 404 254 304V178L480 96Z" fill="url(#shieldOuter)" stroke="#ffffff" stroke-width="8"/>
    <path d="M480 136L656 200V300C656 375 599 430 480 462C361 430 304 375 304 300V200L480 136Z" fill="url(#shieldInner)"/>

    <rect x="384" y="246" width="192" height="146" rx="26" fill="#31d9a4"/>
    <path d="M420 246V212C420 172 452 140 492 140H468C508 140 540 172 540 212V246" fill="none" stroke="#0f2e26" stroke-width="18" stroke-linecap="round"/>
    <circle cx="480" cy="308" r="18" fill="#0f2e26"/>
    <rect x="470" y="324" width="20" height="40" rx="10" fill="#0f2e26"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="172" height="128" rx="14" fill="url(#panel)" stroke="#8dc5ae"/>
    <text x="88" y="182" fill="#1c5d4c" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700">Public Domain</text>
    <text x="88" y="208" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="13">UTXO accounting</text>
    <text x="88" y="228" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="13">Fee routing checks</text>
    <text x="88" y="248" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="13">Consensus replay guards</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="718" y="150" width="172" height="128" rx="14" fill="url(#panel)" stroke="#8dc5ae"/>
    <text x="736" y="182" fill="#1c5d4c" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700">Private Domain</text>
    <text x="736" y="208" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="13">Kyber pathways</text>
    <text x="736" y="228" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="13">Falcon attestations</text>
    <text x="736" y="248" fill="#2d7260" font-family="'Space Grotesk', sans-serif" font-size="13">ZK authenticity tracks</text>
  </g>

  <g stroke="#32ad86" stroke-width="3" stroke-dasharray="8 8" fill="none" opacity="0.8">
    <path d="M242 214C320 214 350 234 384 262"/>
    <path d="M718 214C640 214 610 234 576 262"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="214" y="430" width="532" height="64" rx="14" fill="url(#panel)" stroke="#8dc5ae"/>
    <text x="236" y="458" fill="#1c5e4d" font-family="monospace" font-size="14">policy: private/public coexistence preserved • deterministic state transitions • consensus-safe validation boundaries</text>
    <text x="236" y="478" fill="#1c5e4d" font-family="monospace" font-size="14">goal: production-grade privacy without sacrificing chain auditability</text>
  </g>
</svg>
